name: Deployment
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Validate data
        run: npm run validate

      - name: Generate README
        run: npm run gen:readme

      - name: Build site
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure remote dir
        run: ssh -p ${{ secrets.SERVER_PORT || 22 }} root@${{ secrets.SERVER_HOST }} "mkdir -p ${{ secrets.REMOTE_PATH }}"

      - name: Deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "dist/*"
          target: ${{ secrets.REMOTE_PATH }}
          strip_components: 1
          rm: true

      - name: Reload Nginx
        run: ssh -p ${{ secrets.SERVER_PORT || 22 }} root@${{ secrets.SERVER_HOST }} "nginx -t && nginx -s reload"